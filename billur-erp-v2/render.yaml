services:
  # Backend API (Express)
  - type: web
    name: billur-erp-api
    env: node
    plan: starter
    region: frankfurt
    rootDir: backend
    buildCommand: npm install && npm run build && npm run migrate
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: ALLOWED_ORIGINS
        value: https://billur-erp-web.onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: billur-erp-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: QR_SECRET
        generateValue: true

  # Frontend (Next.js — runtime, not static)
  - type: web
    name: billur-erp-web
    env: node
    plan: starter
    region: frankfurt
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: BACKEND_URL
        value: https://billur-erp-api.onrender.com
      - key: PORT
        value: 3000

databases:
  - name: billur-erp-db
    region: frankfurt
    plan: free
